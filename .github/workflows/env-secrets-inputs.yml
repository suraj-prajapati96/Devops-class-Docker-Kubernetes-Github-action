name: Demo CI ENV

on:
    push
    

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
           - name: Say Hello
             run: echo "Hello from Second CI workflow!"

           - name: Install
             env:
                APP_ENV: demo
             run: echo "Environment $APP_ENV"

           - name: Create demo file
             run : |
                echo "Hello from CI pipeline" > demo.txt
                echo "File created successfully"

           - name: Upload Demo
             uses: actions/upload-artifact@v4
             with:
                name: build-artifacts-demo
                path: .

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
           - name: Test Job
             run: echo "TestJob"